services:
  - type: web
    name: mortgage-broker-assistant
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: RENDER
        value: "true"
      - key: GMAIL_SCAN_SYNC
        value: "true"
      - key: GMAIL_SCAN_TIMEZONE
        value: America/New_York
      - key: DIGEST_HOURS
        value: "8,12,16"
      - key: APPROVAL_PDF_ONLY
        value: "false"
